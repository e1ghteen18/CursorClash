<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CursorClash</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a0a2e;
  --panel: #2d1b4e;
  --panel2: #3d2560;
  --card: #4a2d70;
  --rim: #6b3fa0;
  --red: #ff3d5a;
  --yellow: #ffcc00;
  --green: #2ecc40;
  --cyan: #00e5ff;
  --orange: #ff7b00;
  --pink: #ff4dbb;
  --white: #fff5e4;
  --shadow: rgba(0,0,0,0.5);
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);}
body{font-family:'Nunito',sans-serif;color:var(--white);cursor:none;}

/* ====== SCREENS ====== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.screen.off{display:none!important;}

/* ====== CHUNKY BUTTON SYSTEM ====== */
.gbtn{
  font-family:'Boogaloo',cursive;font-size:22px;letter-spacing:1px;
  border:none;border-radius:14px;padding:14px 28px;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;
  position:relative;transition:transform .08s;outline:none;
  border-bottom:5px solid transparent;
}
.gbtn:active{transform:translateY(3px)!important;border-bottom-width:2px!important;}
.gbtn-red{background:var(--red);color:#fff;border-color:#b01a2e;box-shadow:0 4px 0 #b01a2e;}
.gbtn-yellow{background:var(--yellow);color:var(--ink);border-color:#b08a00;box-shadow:0 4px 0 #b08a00;}
.gbtn-green{background:var(--green);color:#fff;border-color:#157a1e;box-shadow:0 4px 0 #157a1e;}
.gbtn-cyan{background:var(--cyan);color:var(--ink);border-color:#009bb5;box-shadow:0 4px 0 #009bb5;}
.gbtn-ghost{background:var(--card);color:var(--white);border-color:#2a1540;box-shadow:0 4px 0 #2a1540;font-size:16px;padding:10px 20px;}
.gbtn-big{font-size:32px;padding:18px 44px;border-radius:18px;}
.gbtn:hover{transform:translateY(-2px);}

/* ====== LOGIN ====== */
#loginScreen{
  background: var(--ink);
}
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%, #3d1060 0%, transparent 50%),
             radial-gradient(ellipse at 70% 80%, #1a2a60 0%, transparent 50%);
}
.login-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

.login-logo{text-align:center;margin-bottom:28px;position:relative;z-index:1;}
.login-logo .wordmark{
  font-family:'Boogaloo',cursive;font-size:82px;line-height:1;
  color:#fff;
  -webkit-text-stroke:4px #000;
  text-shadow:5px 5px 0 #000, 0 0 30px #9b59b6;
  display:block;
}
.login-logo .tagline{
  font-size:13px;font-weight:900;letter-spacing:8px;text-transform:uppercase;
  color:var(--yellow);background:var(--ink);
  display:inline-block;padding:3px 12px;border-radius:99px;
  border:2px solid var(--yellow);margin-top:6px;
}

.login-card{
  background:var(--panel);
  border:3px solid var(--rim);
  border-radius:22px;padding:28px 32px;width:370px;
  box-shadow:0 10px 0 #0008, inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;z-index:1;
}
.login-card h2{font-family:'Boogaloo',cursive;font-size:28px;color:var(--yellow);text-align:center;margin-bottom:18px;}
.lfield{margin-bottom:12px;}
.lfield label{display:block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--cyan);margin-bottom:5px;}
.lfield input{
  width:100%;padding:11px 15px;
  background:var(--ink);border:2.5px solid var(--rim);border-radius:10px;
  color:var(--white);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  outline:none;transition:border-color .15s;
}
.lfield input:focus{border-color:var(--cyan);}
.lerr{color:var(--red);font-size:12px;font-weight:900;text-align:center;min-height:16px;margin:6px 0;}
.ltoggle{text-align:center;font-size:13px;color:#aaa;margin-top:10px;}
.ltoggle b{color:var(--yellow);cursor:pointer;}

/* ====== MAIN MENU ====== */
#menuScreen{
  background:var(--ink);
}
#menuScreen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, #3d1060 0%,transparent 60%);
}
.menu-layout{display:flex;flex-direction:column;align-items:center;gap:0;position:relative;z-index:1;width:100%;}
.menu-top{
  width:100%;max-width:900px;padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.menu-logo{font-family:'Boogaloo',cursive;font-size:42px;color:#fff;-webkit-text-stroke:2px #000;text-shadow:3px 3px 0 #000;}
.menu-profile{display:flex;align-items:center;gap:12px;}
.menu-coins{
  background:var(--yellow);color:var(--ink);border-radius:99px;
  padding:6px 16px;font-family:'Boogaloo',cursive;font-size:22px;
  border:3px solid #b08a00;box-shadow:0 3px 0 #b08a00;
}
.menu-user{font-size:14px;font-weight:900;color:#ddd;}

.menu-center{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:20px;}
.menu-big-btn{
  width:340px;background:var(--panel2);
  border:3px solid var(--rim);border-radius:20px;
  padding:18px 28px;cursor:pointer;transition:transform .1s;
  display:flex;align-items:center;gap:16px;
  box-shadow:0 6px 0 #1a0a2e;
}
.menu-big-btn:hover{transform:translateY(-3px);}
.menu-big-btn:active{transform:translateY(2px);box-shadow:0 3px 0 #1a0a2e;}
.mbb-icon{font-size:44px;width:56px;text-align:center;}
.mbb-text .mbb-title{font-family:'Boogaloo',cursive;font-size:26px;color:var(--white);}
.mbb-text .mbb-sub{font-size:12px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:1px;}
.menu-big-btn.primary{border-color:var(--red);box-shadow:0 6px 0 #8b0000;}
.menu-big-btn.primary .mbb-title{color:var(--red);}
.menu-big-btn.practice{border-color:var(--green);box-shadow:0 6px 0 #0a4010;}
.menu-big-btn.practice .mbb-title{color:var(--green);}

.menu-stats{
  display:flex;gap:10px;margin-top:8px;
}
.mstat{background:var(--panel);border:2.5px solid var(--rim);border-radius:12px;padding:10px 18px;text-align:center;}
.mstat-val{font-family:'Boogaloo',cursive;font-size:28px;color:var(--yellow);}
.mstat-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#888;}

/* ====== MATCHMAKING ====== */
#mmScreen{background:var(--ink);}
#mmScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, #2d1060 0%,transparent 60%);}
.mm-card{
  background:var(--panel);border:3px solid var(--rim);border-radius:24px;
  padding:44px;text-align:center;width:380px;
  box-shadow:0 10px 0 #0009;position:relative;z-index:1;
}
.mm-card h2{font-family:'Boogaloo',cursive;font-size:36px;color:var(--yellow);margin-bottom:20px;}
.mm-orb{
  width:80px;height:80px;margin:0 auto 20px;border-radius:50%;
  border:4px solid var(--rim);border-top-color:var(--red);
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.mm-dots{font-family:'Boogaloo',cursive;font-size:64px;color:var(--cyan);line-height:1;}
.mm-status{font-size:14px;font-weight:900;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:2px;}

/* ====== GAME SCREEN ====== */
#gameScreen{background:#080612;}
#gameCanvas{display:block;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:10px 14px;pointer-events:none;z-index:20;
}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:6px;}
.hud-center{display:flex;flex-direction:column;align-items:center;gap:4px;}

.hud-pill{
  background:rgba(10,5,20,.82);border:2.5px solid rgba(120,60,180,.6);
  border-radius:99px;padding:5px 14px;backdrop-filter:blur(6px);
  font-family:'Boogaloo',cursive;font-size:18px;
  display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 2px 8px #0006;
}
.hud-timer{
  font-family:'Boogaloo',cursive;font-size:38px;color:var(--white);
  background:rgba(10,5,20,.82);border:3px solid rgba(120,60,180,.6);
  border-radius:14px;padding:2px 18px;backdrop-filter:blur(6px);
  text-shadow:0 0 10px rgba(255,255,255,.3);
  box-shadow:0 2px 8px #0006;
  transition:color .3s;
}
.hud-timer.danger{color:var(--red);animation:timerDanger .5s infinite alternate;}
@keyframes timerDanger{to{text-shadow:0 0 16px var(--red),0 0 4px #fff;}}
.hud-round{font-family:'Boogaloo',cursive;font-size:14px;color:#aaa;letter-spacing:3px;text-transform:uppercase;}

.hud-event-banner{
  background:linear-gradient(90deg,transparent,rgba(255,60,90,.85) 20%,rgba(255,60,90,.85) 80%,transparent);
  font-family:'Boogaloo',cursive;font-size:18px;color:#fff;
  padding:4px 24px;letter-spacing:1px;text-align:center;
  animation:eventFlash 1.5s infinite alternate;
}
@keyframes eventFlash{to{background:linear-gradient(90deg,transparent,rgba(255,150,0,.85) 20%,rgba(255,150,0,.85) 80%,transparent);}}

/* Leaderboard */
#lb{
  position:absolute;right:12px;top:70px;
  background:rgba(10,5,20,.82);border:2.5px solid rgba(120,60,180,.5);
  border-radius:14px;padding:10px 14px;min-width:170px;
  backdrop-filter:blur(6px);pointer-events:none;z-index:20;
  box-shadow:0 4px 12px #0005;
}
.lb-hdr{font-family:'Boogaloo',cursive;font-size:15px;color:var(--yellow);text-align:center;margin-bottom:6px;letter-spacing:1px;}
.lb-row{display:flex;justify-content:space-between;gap:12px;font-size:13px;font-weight:900;padding:2px 0;align-items:center;}
.lb-row.me{color:var(--cyan);}
.lb-medal{width:16px;text-align:center;}

/* Powerup bar */
#pwbar{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;pointer-events:none;z-index:20;
}
.pw-slot{
  width:48px;height:48px;border-radius:12px;
  background:rgba(10,5,20,.8);border:2.5px solid rgba(120,60,180,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;position:relative;
  box-shadow:0 3px 8px #0005;
}
.pw-slot.active{border-color:var(--yellow);box-shadow:0 0 10px var(--yellow);}
.pw-timer{
  position:absolute;bottom:-2px;left:0;right:0;height:4px;
  border-radius:0 0 8px 8px;background:var(--yellow);
  transform-origin:left;transition:transform .1s linear;
}

/* ====== OVERLAY ====== */
#gameOverlay{
  position:absolute;inset:0;
  background:rgba(8,6,18,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:60;backdrop-filter:blur(8px);
}
#gameOverlay.off{display:none!important;}
.ov-title{font-family:'Boogaloo',cursive;font-size:80px;color:#fff;line-height:1;text-align:center;-webkit-text-stroke:3px #000;text-shadow:4px 4px 0 #000;}
.ov-title.red{color:var(--red);text-shadow:4px 4px 0 #600;}
.ov-title.yellow{color:var(--yellow);text-shadow:4px 4px 0 #604000;}
.ov-title.green{color:var(--green);text-shadow:4px 4px 0 #003010;}
.ov-sub{font-size:20px;font-weight:900;color:#ccc;margin-top:8px;text-align:center;}
.ov-countdown{font-family:'Boogaloo',cursive;font-size:110px;color:var(--cyan);line-height:1;text-shadow:0 0 30px var(--cyan),4px 4px 0 #000;}
.ov-event-icon{font-size:80px;margin-bottom:8px;animation:iconPop .4s cubic-bezier(.3,1.4,.5,1) both;}
@keyframes iconPop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}

/* ====== END SCREEN ====== */
#endScreen{background:var(--ink);}
#endScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%, #3d1060 0%,transparent 55%);}
.end-card{
  background:var(--panel);border:3px solid var(--rim);border-radius:24px;
  padding:36px 44px;text-align:center;width:440px;
  box-shadow:0 10px 0 #0009;position:relative;z-index:1;
}
.end-place-icon{font-size:90px;line-height:1;display:block;}
.end-place-label{font-family:'Boogaloo',cursive;font-size:48px;margin-bottom:4px;}
.end-place-label.gold{color:#ffd700;text-shadow:3px 3px 0 #8a6000;}
.end-place-label.silver{color:#c0c0c0;text-shadow:3px 3px 0 #666;}
.end-place-label.bronze{color:#cd7f32;text-shadow:3px 3px 0 #6a3500;}
.end-place-label.other{color:#aaa;}
.end-statsrow{display:flex;gap:10px;margin:18px 0;justify-content:center;}
.end-stat{background:var(--ink);border-radius:12px;padding:12px 16px;flex:1;}
.end-stat-v{font-family:'Boogaloo',cursive;font-size:32px;color:var(--yellow);}
.end-stat-l{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#888;}
.end-btns{display:flex;flex-direction:column;gap:8px;}

/* ====== TOAST ====== */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel);border:2.5px solid var(--rim);border-radius:14px;
  padding:10px 22px;font-family:'Boogaloo',cursive;font-size:20px;
  z-index:300;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;
  box-shadow:0 4px 16px #0008;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ====== FLOATING HIT TEXT ====== */
.flt{
  position:absolute;font-family:'Boogaloo',cursive;font-size:22px;
  pointer-events:none;z-index:30;white-space:nowrap;
  -webkit-text-stroke:1px #000;text-shadow:1px 1px 0 #000;
  animation:fltUp 1.1s ease forwards;
}
@keyframes fltUp{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-70px) scale(0.7)}}
</style>
</head>

<!-- ██ GAME ██ -->

let mmWatcher=null, mmRef=null;
async function startMatchmaking(){
  showScreen('mmScreen'); $('mmCount').textContent='1'; isPractice=false;
  const lobSnap=await get(ref(db,'matchmaking'));
  let joined=false;
  if(lobSnap.exists()){
    for(const [lid,lob] of Object.entries(lobSnap.val())){
      const pc=Object.keys(lob.players||{}).length;
      if(!lob.started&&pc<MAX_PL){
        await set(ref(db,`matchmaking/${lid}/players/${cUser.uid}`),{username:uProf.username,at:Date.now()});
        roomKey=lid; joined=true; watchMM(lid); break;
      }
    }
  }
  if(!joined){
    const nr=push(ref(db,'matchmaking')); roomKey=nr.key;
    await set(nr,{host:cUser.uid,started:false,at:Date.now(),players:{[cUser.uid]:{username:uProf.username,at:Date.now()}}});
    watchMM(roomKey);
  }
}
function watchMM(lid){
  if(mmWatcher){off(mmRef);}
  mmRef=ref(db,`matchmaking/${lid}`);
  mmWatcher=onValue(mmRef,async snap=>{
    if(!snap.exists())return;
    const lob=snap.val(); const pls=Object.entries(lob.players||{});
    $('mmCount').textContent=pls.length;
    if(lob.gameStarted){off(mmRef);mmWatcher=null;joinGame(lid);return;}
    if(!lob.started&&pls.length>=2){
      const oldest=Math.min(...pls.map(([,p])=>p.at));
      if(Date.now()-oldest>=4500||pls.length>=MAX_PL){
        if(lob.host===cUser.uid){off(mmRef);mmWatcher=null;await hostStartGame(lid,pls);}
      }
    }
  });
}
$('btnCancelMM').onclick=async()=>{
  if(roomKey) await remove(ref(db,`matchmaking/${roomKey}/players/${cUser.uid}`));
  if(mmWatcher){off(mmRef);mmWatcher=null;}

function joinGame(gid){

  particles=[];floats=[];boulders=[];laserTrails=[];wormholes=[];keys={};
  setupCanvas(); showScreen('gameScreen');

    const prev=GS; GS=snap.val();
    isHost=(GS.host===cUser.uid);
    if(GS.host===cUser.uid){myX=GS.players[myUID]?.x||myX;myY=GS.players[myUID]?.y||myY;}
    onGSUpdate(prev);
  });
  document.addEventListener('keydown',onKey);
  document.addEventListener('keyup',onKUp);
  document.addEventListener('mousemove',onMM);
  if(raf)cancelAnimationFrame(raf);
  lastT=performance.now();
  raf=requestAnimationFrame(gameLoop);
}

function startGameLoop(){
  setupCanvas(); showScreen('gameScreen');
  document.addEventListener('keydown',onKey);
  document.addEventListener('keyup',onKUp);
  document.addEventListener('mousemove',onMM);
  particles=[];floats=[];boulders=[];laserTrails=[];wormholes=[];keys={};
  if(raf)cancelAnimationFrame(raf);
  lastT=performance.now(); raf=requestAnimationFrame(gameLoop);
}

function setupCanvas(){

function onMM(e){

// ════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════
function gameLoop(ts){
  raf=requestAnimationFrame(gameLoop);
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;
  if(!GS)return;

  const phase=GS.phase;
  const me=GS.players?.[myUID];

  // ── Phase: countdown ──
  if(phase==='countdown'){
    const left=(GS.roundStart-Date.now())/1000;
    const cc=left>0?Math.ceil(left):0;
    showOverlay(GS.round===1?'GET READY!':('ROUND '+GS.round), '', cc>0?String(cc):'GO!', GS.round===1?'yellow':'yellow');
    if(left<=0&&isHost) doPhaseTransition('playing');
    drawGame(ts); return;
  }
  if(phase==='playing'){
    hideOverlay();
    const tl=Math.max(0,(GS.roundEnd-Date.now())/1000);
    updateHUD(tl);
    if(tl<=0&&isHost) doRoundEnd();
  }
  if(phase==='intermission'){
    const left=(GS.intermissionEnd-Date.now())/1000;
    const cc=Math.max(0,Math.ceil(left));
    showOverlay('ROUND OVER!',getTopPlayer(),'Next: '+cc+'s','red');
    if(left<=0&&isHost) doNextRound();
    drawGame(ts); return;
  }
  if(phase==='gameover'){ showEndScreen(); return; }

  // ── Move my ball ──
  if(me?.alive && !me?.frozen){
    const sp=SPDFACTOR*(GS.speedMod||1)*(me.powerup==='speed'?1.8:1);
    const dx=mX-myX, dy=mY-myY, dist=Math.sqrt(dx*dx+dy*dy);
    let ax=0,ay=0;
    const mirror=GS.mirror?-1:1;
    if(dist>5){ax=(dx/dist)*sp*mirror;ay=(dy/dist)*sp*mirror;}
    if(keys['KeyA']||keys['ArrowLeft'])ax-=sp*mirror;
    if(keys['KeyD']||keys['ArrowRight'])ax+=sp*mirror;
    if(keys['KeyW']||keys['ArrowUp'])ay-=sp*mirror;
    if(keys['KeyS']||keys['ArrowDown'])ay+=sp*mirror;

    const fr=Math.pow(FRICTION*(GS.frMod||1),dt*60);
    myVX=(myVX+ax*dt*8)*fr; myVY=(myVY+ay*dt*8)*fr;
    myVX+=(GS.windX||0)*dt*10;
    myVY+=(GS.gravity||0.15)*dt*60*0.4;

    myX+=myVX; myY+=myVY;
    const r=BR*(me.rmod||1);
    myX=Math.max(r,Math.min(AW-r,myX)); myY=Math.max(r,Math.min(AH-r,myY));
    (GS.obstacles||[]).forEach(o=>wallCollide(o,me));

    // Warp dash
    if(keys['Space']&&me.powerup==='warp'){myVX*=3;myVY*=3;}

    // Ghost wall pass
    if(!me.ghost){myX=Math.max(r,Math.min(AW-r,myX));myY=Math.max(r,Math.min(AH-r,myY));}

    if(ts-lastPush>50){
      lastPush=ts;
      if(!isPractice) update(ref(db,`games/${roomKey}/players/${myUID}`),{x:Math.round(myX),y:Math.round(myY),vx:+myVX.toFixed(2),vy:+myVY.toFixed(2)});
      else {GS.players[myUID].x=Math.round(myX);GS.players[myUID].y=Math.round(myY);GS.players[myUID].vx=+myVX.toFixed(2);GS.players[myUID].vy=+myVY.toFixed(2);}
    }

    // Laser trail
    if(me.powerup==='laser') laserTrails.push({x:myX,y:myY,life:1.5,color:me.color||COLS[0]});
  }

  // ── Practice: update bots ──
  if(isPractice&&phase==='playing') updateBots(dt,ts);

  // ── Host: game logic ──
  if(isHost&&phase==='playing') doHostTick(dt,ts);

  // ── Particles & effects ──
  updateParticles(dt);
  updateBoulders(dt);
  updateLaserTrails(dt);
  updateLeaderboard();
  drawGame(ts);
}

// ════════════════════════════════════════
//  BOT AI
// ════════════════════════════════════════
function updateBots(dt,ts){
  const skill=BOT_SKILL.medium;
  bots.forEach(bot=>{
    if(!bot.alive)return;
    bot.tickTimer-=dt;
    if(bot.tickTimer<=0){
      bot.tickTimer=0.05+Math.random()*0.15;
      // Find nearest player or powerup to chase
      const players=Object.values(GS.players||{}).filter(p=>p.alive&&p!==bot);
      const pus=Object.values(GS.powerups||{});
      let tx=myX,ty=myY; // target = me by default
      // Chase nearest powerup sometimes
      if(pus.length&&Math.random()<0.35){
        const pu=pus[Math.floor(Math.random()*pus.length)];
        tx=pu.x;ty=pu.y;
      } else if(players.length) {
        const t=players[Math.floor(Math.random()*players.length)];
        tx=t.x;ty=t.y;
      }
      // Add error
      tx+=( Math.random()-0.5)*skill.err;
      ty+=(Math.random()-0.5)*skill.err;
      bot.tx=tx;bot.ty=ty;
    }
    const dx=bot.tx-bot.x, dy=bot.ty-bot.y, dist=Math.sqrt(dx*dx+dy*dy)+0.01;
    const sp=SPDFACTOR*skill.speed;
    const fr=Math.pow(FRICTION*(GS.frMod||1),dt*60);
    bot.vx=(bot.vx+(dx/dist)*sp*dt*8)*fr;
    bot.vy=(bot.vy+(dy/dist)*sp*dt*8)*fr;
    bot.vx+=(GS.windX||0)*dt*10;
    bot.vy+=(GS.gravity||0.15)*dt*60*0.4;
    const br=BR*(bot.rmod||1);
    bot.x=Math.max(br,Math.min(AW-br,bot.x+bot.vx));
    bot.y=Math.max(br,Math.min(AH-br,bot.y+bot.vy));
    (GS.obstacles||[]).forEach(o=>wallCollideBall(o,bot));
    // Update GS
    GS.players[bot.uid].x=Math.round(bot.x);GS.players[bot.uid].y=Math.round(bot.y);
    GS.players[bot.uid].vx=+bot.vx.toFixed(2);GS.players[bot.uid].vy=+bot.vy.toFixed(2);
  });
}

// ════════════════════════════════════════
//  HOST LOGIC
// ════════════════════════════════════════
function doHostTick(dt,ts){
  if(ts-hostTick<100)return; hostTick=ts;
  const players=GS.players||{};
  const alive=Object.entries(players).filter(([,p])=>p.alive);
  const updates={};

  // Player vs player collisions
  alive.forEach(([uid,p],i)=>{
    alive.forEach(([uid2,p2],j)=>{
      if(i>=j)return;
      const r1=BR*(p.rmod||1), r2=BR*(p2.rmod||1);
      const dx=p2.x-p.x, dy=p2.y-p.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<r1+r2&&dist>0.1){
        const nx=dx/dist, ny=dy/dist;
        const rel=(p.vx-p2.vx)*nx+(p.vy-p2.vy)*ny;
        if(rel>0){
          const bounce=rel*(p.powerup==='explosive'?2.2:p.powerup==='bounce'?1.9:1.5);
          updates[`players/${uid}/vx`]=+(( p.vx-bounce*nx).toFixed(2));
          updates[`players/${uid}/vy`]=+(( p.vy-bounce*ny).toFixed(2));
          updates[`players/${uid2}/vx`]=(+(p2.vx+bounce*nx).toFixed(2));
          updates[`players/${uid2}/vy`]=(+(p2.vy+bounce*ny).toFixed(2));
          // Spark effect (local)
          const cx=(p.x+p2.x)/2, cy=(p.y+p2.y)/2;
          spawnSparks(cx,cy,p.color,8); spawnSparks(cx,cy,p2.color,8);
          // Freeze
          if(p.powerup==='freeze'){updates[`players/${uid2}/frozen`]=true;updates[`players/${uid2}/frozenEnd`]=Date.now()+2500;}
          if(p2.powerup==='freeze'){updates[`players/${uid}/frozen`]=true;updates[`players/${uid}/frozenEnd`]=Date.now()+2500;}
          // Sticky
          if(p.powerup==='sticky'){updates[`players/${uid2}/frMod`]=0.55;}
          if(p2.powerup==='sticky'){updates[`players/${uid}/frMod`]=0.55;}
          // Explode
          if(p.powerup==='explosive'||p2.powerup==='explosive'){
            spawnExplosion((p.x+p2.x)/2,(p.y+p2.y)/2,14);
          }
        }
        // KO check
        const spd=Math.sqrt((p.vx||0)**2+(p.vy||0)**2);
        if(spd>8&&!p2.shield){
          const nx2=p2.x, ny2=p2.y;
          if(nx2<=BR+3||nx2>=AW-BR-3||ny2<=BR+3||ny2>=AH-BR-3){
            updates[`players/${uid2}/alive`]=false;
            updates[`players/${uid}/score`]=(p.score||0)+120;
            updates[`players/${uid}/kills`]=(p.kills||0)+1;
            spawnExplosion(p2.x,p2.y,20);
          }
        }
      }
    });
    // Unfreeze
    if(p.frozen&&Date.now()>p.frozenEnd){updates[`players/${uid}/frozen`]=false;}
    // Powerup expiry
    if(p.powerup&&Date.now()>p.powerupEnd){
      updates[`players/${uid}/powerup`]=null;
      if(p.powerup==='big'||p.powerup==='tiny') updates[`players/${uid}/rmod`]=1;
      if(p.powerup==='shield') updates[`players/${uid}/shield`]=false;
      if(p.powerup==='ghost')  updates[`players/${uid}/ghost`]=false;
    }
    // Collect powerups
    Object.entries(GS.powerups||{}).forEach(([pid,pu])=>{
      const dx=p.x-pu.x,dy=p.y-pu.y;
      if(Math.sqrt(dx*dx+dy*dy)<BR*(p.rmod||1)+22){
        const pdef=POWERUP_DEFS.find(d=>d.id===pu.type);
        if(pdef){
          updates[`players/${uid}/powerup`]=pu.type;
          updates[`players/${uid}/powerupEnd`]=Date.now()+pdef.dur;
          if(pu.type==='big')  updates[`players/${uid}/rmod`]=1.85;
          if(pu.type==='tiny') updates[`players/${uid}/rmod`]=0.5;
          if(pu.type==='shield')updates[`players/${uid}/shield`]=true;
          if(pu.type==='ghost') updates[`players/${uid}/ghost`]=true;
          updates[`powerups/${pid}`]=null;
        }
      }
    });
    // Collect coins
    Object.entries(GS.coins||{}).forEach(([cid,c])=>{
      const dx=p.x-c.x,dy=p.y-c.y;
      const range=p.powerup==='magnet'?90:22;
      if(Math.sqrt(dx*dx+dy*dy)<BR*(p.rmod||1)+range){
        updates[`players/${uid}/coins`]=(p.coins||0)+c.v;
        updates[`coins/${cid}`]=null;
      }
    });
    // Lava floor death
    if(GS.lavaFloor&&p.y>AH-35&&!p.shield){updates[`players/${uid}/alive`]=false;spawnExplosion(p.x,p.y,16);}
  });

  // Spawn powerups
  puTick+=100;
  const spawnRate=GS.fastPU?2500:8000;
  if(puTick>spawnRate){
    puTick=0;
    const puCount=Object.keys(GS.powerups||{}).length;
    if(puCount<6){
      const pdef=POWERUP_DEFS[Math.floor(Math.random()*POWERUP_DEFS.length)];
      const newKey=isPractice?('pu_'+Math.random().toString(36).slice(2)):(push(ref(db,`games/${roomKey}/powerups`)).key);
      const puData={type:pdef.id,x:80+Math.random()*(AW-160),y:60+Math.random()*(AH-120)};
      if(isPractice) GS.powerups[newKey]=puData;
      else update(ref(db,`games/${roomKey}/powerups/${newKey}`),puData);
    }
    // Spawn coin
    const ck=isPractice?('c_'+Math.random().toString(36).slice(2)):(push(ref(db,`games/${roomKey}/coins`)).key);
    const coinData={x:80+Math.random()*(AW-160),y:60+Math.random()*(AH-120),v:10+Math.floor(Math.random()*25)};
    if(isPractice) GS.coins[ck]=coinData;
    else update(ref(db,`games/${roomKey}/coins/${ck}`),coinData);
  }

  // Coin rain event
  if(GS.coinRain&&Math.random()<0.06){
    const ck=isPractice?('cr_'+Math.random().toString(36).slice(2)):(push(ref(db,`games/${roomKey}/coins`)).key);
    const coinData={x:Math.random()*AW,y:Math.random()*AH,v:5};
    if(isPractice) GS.coins[ck]=coinData; else update(ref(db,`games/${roomKey}/coins/${ck}`),coinData);
  }

  // Volcano boulders
  if(GS.volcano&&Math.random()<0.12){
    boulders.push({x:Math.random()*AW,y:-20,vx:(Math.random()-.5)*4,vy:2+Math.random()*4,r:10+Math.random()*18,rot:0,rotV:(Math.random()-.5)*.2});
  }

  // Wormholes setup
  if(GS.wormholes&&wormholes.length===0){
    wormholes=[{x:100,y:100},{x:AW-100,y:AH-100},{x:AW-100,y:100},{x:100,y:AH-100}];
  } else if(!GS.wormholes&&wormholes.length>0){ wormholes=[]; }

  // Wormhole teleport
  if(wormholes.length>0){
    alive.forEach(([uid,p])=>{
      wormholes.forEach((wh,wi)=>{
        if(Math.sqrt((p.x-wh.x)**2+(p.y-wh.y)**2)<30){
          const dest=wormholes[(wi+2)%wormholes.length];
          updates[`players/${uid}/x`]=dest.x; updates[`players/${uid}/y`]=dest.y;
          if(uid===myUID){myX=dest.x;myY=dest.y;}
          spawnRing(dest.x,dest.y,'#818cf8',10);
        }
      });
    });
  }

  if(Object.keys(updates).length>0){
    if(isPractice){ applyLocalUpdates(updates); }
    else update(roomRef,updates);
  }
}

function applyLocalUpdates(updates){
  for(const [path,val] of Object.entries(updates)){
    const parts=path.split('/');
    let cur=GS;
    for(let i=0;i<parts.length-1;i++){
      if(!cur[parts[i]])cur[parts[i]]={};
      cur=cur[parts[i]];
    }
    if(val===null) delete cur[parts[parts.length-1]];
    else cur[parts[parts.length-1]]=val;
  }
  // Sync bot objects from GS
  bots.forEach(b=>{
    const gp=GS.players[b.uid];
    if(gp){b.alive=gp.alive;b.score=gp.score;b.kills=gp.kills;b.x=gp.x;b.y=gp.y;b.vx=gp.vx;b.vy=gp.vy;}
  });
}

function wallCollide(obs,me){
  const r=BR*(me?.rmod||1);
  const nx=Math.max(obs.x,Math.min(myX,obs.x+obs.w)), ny=Math.max(obs.y,Math.min(myY,obs.y+obs.h));
  const dx=myX-nx,dy=myY-ny,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<r&&dist>0.01){
    const nx2=dx/dist,ny2=dy/dist;
    myX=nx+nx2*(r+0.5); myY=ny+ny2*(r+0.5);
    const dot=myVX*nx2+myVY*ny2;
    myVX-=1.6*dot*nx2; myVY-=1.6*dot*ny2;
  }
}
function wallCollideBall(obs,b){
  const r=BR*(b.rmod||1);
  const nx=Math.max(obs.x,Math.min(b.x,obs.x+obs.w)), ny=Math.max(obs.y,Math.min(b.y,obs.y+obs.h));
  const dx=b.x-nx,dy=b.y-ny,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<r&&dist>0.01){
    const nx2=dx/dist,ny2=dy/dist;
    b.x=nx+nx2*(r+0.5); b.y=ny+ny2*(r+0.5);
    const dot=b.vx*nx2+b.vy*ny2;
    b.vx-=1.6*dot*nx2; b.vy-=1.6*dot*ny2;
  }
}

function doPhaseTransition(newPhase){

  else update(roomRef,{phase:newPhase,roundEnd:Date.now()+ROUND_SEC*1000});

async function doRoundEnd(){
  const pls=GS.players||{};
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  const resetState={phase:'intermission',intermissionEnd:Date.now()+INTERMISSION_SEC*1000,event:ev.id};
  // Reset modifiers
  Object.assign(resetState,{gravity:0.15,windX:0,frMod:1,dark:false,lavaFloor:false,volcano:false,mirror:false,speedMod:1,fastPU:false,coinRain:false,wormholes:false});
  // Respawn all
  const sp=[{x:80,y:80},{x:AW-80,y:80},{x:80,y:AH-80},{x:AW-80,y:AH-80}]; let si=0;
  Object.keys(pls).forEach(uid=>{
    const s=sp[si++%4];
    resetState[`players/${uid}/alive`]=true; resetState[`players/${uid}/x`]=s.x; resetState[`players/${uid}/y`]=s.y;
    resetState[`players/${uid}/vx`]=0; resetState[`players/${uid}/vy`]=0;
    resetState[`players/${uid}/powerup`]=null; resetState[`players/${uid}/shield`]=false;
    resetState[`players/${uid}/ghost`]=false; resetState[`players/${uid}/frozen`]=false; resetState[`players/${uid}/rmod`]=1;
    if(uid===myUID){myX=s.x;myY=s.y;myVX=0;myVY=0;}
  });
  resetState.powerups={}; resetState.coins={};
  if(isPractice){applyLocalUpdates(resetState);}
  else await update(roomRef,resetState);
}

async function doNextRound(){
  const newRound=(GS.round||1)+1;
  if(newRound>ROUNDS){
    if(isPractice){GS.phase='gameover';}
    else await update(roomRef,{phase:'gameover'});
    return;
  }
  const ev=EVENTS.find(e=>e.id===GS.event);
  const modState={phase:'countdown',round:newRound,roundStart:Date.now()+4000,gravity:0.15,windX:0,frMod:1,dark:false,lavaFloor:false,volcano:false,mirror:false,speedMod:1,fastPU:false,coinRain:false,wormholes:false};
  const fakePls={};
  if(ev){ev.apply(modState,fakePls);}
  modState.obstacles=OBSTACLE_MAPS[Math.floor(Math.random()*OBSTACLE_MAPS.length)];
  if(isPractice){Object.assign(GS,modState);boulders=[];wormholes=[];}
  else await update(roomRef,modState);
}

//  GS UPDATE HANDLER (multiplayer)
// ════════════════════════════════════════
function onGSUpdate(prev){
  if(!GS||!prev)return;
  const me=GS.players?.[myUID];
  if(me?.alive){
    const dx=me.x-myX,dy=me.y-myY;
    if(Math.sqrt(dx*dx+dy*dy)>80){myX=me.x;myY=me.y;myVX=me.vx||0;myVY=me.vy||0;}
  }
  // KO/powerup events
  Object.entries(GS.players||{}).forEach(([uid,p])=>{
    const pp=prev.players?.[uid];
    if(!pp)return;
    if(pp.alive&&!p.alive){
      spawnExplosion(p.x,p.y,22);
      if(uid===myUID)toast('💀 KNOCKED OUT!','#ff3d5a');
    }
    if((pp.kills||0)<(p.kills||0)&&uid===myUID){
      toast('💥 KO! +120','#00e5ff');
      flt(myX-20,myY-30,'+120 KO!','#00e5ff');
    }
    if((pp.coins||0)<(p.coins||0)&&uid===myUID){
      flt(myX,myY-20,`+${p.coins-pp.coins} 🪙`,'#ffcc00');
    }
  });
  if(prev.event!==GS.event&&GS.event){
    const ev=EVENTS.find(e=>e.id===GS.event);
    if(ev)toast(`${ev.icon} ${ev.name}!`,ev.col);
  }
  updateLeaderboard();
  $('hudCoins').textContent=GS.players?.[myUID]?.coins||0;
  $('hudScore').textContent=GS.players?.[myUID]?.score||0;
  $('hudKOs').textContent=GS.players?.[myUID]?.kills||0;
}

function updateLeaderboard(){

function getTopPlayer(){

// ════════════════════════════════════════
//  PARTICLES & EFFECTS
// ════════════════════════════════════════
function spawnSparks(x,y,col,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col:Math.random()<.5?col:'#fff',r:2+Math.random()*4,life:0.5+Math.random()*0.4,maxLife:0.9,type:'spark'});
  }
}
function spawnExplosion(x,y,n=14){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i,sp=3+Math.random()*8;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col:['#ff3d5a','#ffcc00','#ff7b00','#fff'][Math.floor(Math.random()*4)],r:3+Math.random()*6,life:0.9+Math.random()*.5,maxLife:1.4,type:'exp'});
  }
  for(let i=0;i<6;i++) particles.push({x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,vx:(Math.random()-.5)*12,vy:(Math.random()-.5)*12,col:'#fff',r:5,life:0.3,maxLife:0.3,type:'flash'});
}
function spawnRing(x,y,col,n=8){
  for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i,sp=3+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col,r:3,life:0.7,maxLife:0.7,type:'ring'});}
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=.93;p.vy*=.93;p.life-=dt*1.8;
    if(p.life<=0)particles.splice(i,1);
  }
}
function updateBoulders(dt){
  for(let i=boulders.length-1;i>=0;i--){
    const b=boulders[i];b.x+=b.vx;b.y+=b.vy;b.vy+=.18;b.rot+=b.rotV;
    if(b.y>AH+50)boulders.splice(i,1);
  }
}
function updateLaserTrails(dt){for(let i=laserTrails.length-1;i>=0;i--){laserTrails[i].life-=dt*2;if(laserTrails[i].life<=0)laserTrails.splice(i,1);}}

// ════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════
function drawGame(ts=0){
  const cv=$('gameCanvas'); const ctx=cv.getContext('2d');
  if(!GS)return;
  const dark=GS.dark;

  // Background
  ctx.fillStyle=dark?'#03020a':'#0a0618'; ctx.fillRect(0,0,AW,AH);
  if(!dark){
    // Stylized grid
    ctx.strokeStyle='rgba(80,40,120,.25)'; ctx.lineWidth=1;
    for(let x=0;x<AW;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,AH);ctx.stroke();}
    for(let y=0;y<AH;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(AW,y);ctx.stroke();}
    // Corner accents
    ctx.strokeStyle='rgba(160,80,255,.3)'; ctx.lineWidth=2;
    [[0,0,1,1],[AW,0,-1,1],[0,AH,1,-1],[AW,AH,-1,-1]].forEach(([cx,cy,sx,sy])=>{
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+sx*60,cy);ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+sy*60);ctx.stroke();
    });
  } else {
    // Dark mode: spotlight on me
    const gr=ctx.createRadialGradient(myX,myY,0,myX,myY,200);
    gr.addColorStop(0,'rgba(255,255,255,.05)'); gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,AW,AH);
  }

  // Arena border (thick chunky)
  ctx.strokeStyle='#5b21b6'; ctx.lineWidth=5;
  ctx.strokeRect(3,3,AW-6,AH-6);
  ctx.strokeStyle='rgba(168,85,247,.3)'; ctx.lineWidth=2;
  ctx.strokeRect(8,8,AW-16,AH-16);

  // Lava floor
  if(GS.lavaFloor){
    const lv=ctx.createLinearGradient(0,AH-60,0,AH);
    lv.addColorStop(0,'rgba(239,68,68,0)');lv.addColorStop(0.5,'rgba(239,68,68,.5)');lv.addColorStop(1,'rgba(251,146,60,.8)');
    ctx.fillStyle=lv; ctx.fillRect(0,AH-60,AW,60);
    // Lava glow pulses
    ctx.fillStyle=`rgba(255,100,0,${.15+.08*Math.sin(ts/200)})`;
    ctx.fillRect(0,AH-14,AW,14);
  }

  // Wind indicator
  if(GS.windX){
    ctx.save(); ctx.globalAlpha=0.2;
    ctx.strokeStyle='#f59e0b'; ctx.lineWidth=2;
    for(let y=40;y<AH;y+=60){
      const dir=GS.windX>0?1:-1;
      for(let x=0;x<AW;x+=80){
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+dir*30,y+8);ctx.lineTo(x+dir*20,y+2);ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Obstacles
  (GS.obstacles||[]).forEach(o=>{
    ctx.save();
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.beginPath(); ctx.roundRect(o.x+4,o.y+6,o.w,o.h,10); ctx.fill();
    // Body
    ctx.fillStyle='#2d1b4e'; ctx.strokeStyle='#5b21b6'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.roundRect(o.x,o.y,o.w,o.h,10); ctx.fill(); ctx.stroke();
    // Top highlight
    ctx.fillStyle='rgba(255,255,255,.07)';
    ctx.beginPath(); ctx.roundRect(o.x+4,o.y+4,o.w-8,8,4); ctx.fill();
    ctx.restore();
  });

  // Wormholes
  wormholes.forEach((wh,i)=>{
    ctx.save();
    const pulse=Math.sin(ts/300+i)*4;
    ctx.shadowColor='#818cf8'; ctx.shadowBlur=16+pulse;
    ctx.strokeStyle='#818cf8'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(wh.x,wh.y,24+pulse,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(129,140,248,.4)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(wh.x,wh.y,36+pulse,0,Math.PI*2); ctx.stroke();
    ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🕳',wh.x,wh.y);
    ctx.restore();
  });

  // Laser trails
  laserTrails.forEach(lt=>{
    ctx.save(); ctx.globalAlpha=lt.life*0.6;
    ctx.fillStyle=lt.color; ctx.shadowColor=lt.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(lt.x,lt.y,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Coins
  Object.values(GS.coins||{}).forEach(c=>{
    ctx.save();
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=12;
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(c.x,c.y,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(c.x-2,c.y-2,3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#b08a00'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(c.x,c.y,9,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  // Powerups
  Object.values(GS.powerups||{}).forEach(pu=>{
    const pdef=POWERUP_DEFS.find(d=>d.id===pu.type); if(!pdef)return;
    const pulse=Math.sin(ts/250)*3;
    ctx.save();
    ctx.shadowColor=pdef.col; ctx.shadowBlur=18+pulse;
    // Outer ring
    ctx.strokeStyle=pdef.col; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(pu.x,pu.y,22+pulse,0,Math.PI*2); ctx.stroke();
    // Fill
    ctx.fillStyle=pdef.col+'22'; ctx.beginPath(); ctx.arc(pu.x,pu.y,22+pulse,0,Math.PI*2); ctx.fill();
    // Spin ring
    ctx.strokeStyle=pdef.col+'80'; ctx.lineWidth=1.5;
    ctx.setLineDash([6,6]); ctx.lineDashOffset=ts/30;
    ctx.beginPath(); ctx.arc(pu.x,pu.y,30,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
    ctx.font='20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pdef.icon,pu.x,pu.y);
    // Name label
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.beginPath(); ctx.roundRect(pu.x-28,pu.y+28,56,14,4); ctx.fill();
    ctx.fillStyle=pdef.col; ctx.font='bold 9px Nunito,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pdef.name,pu.x,pu.y+35);
  });

  // Boulders
  boulders.forEach(b=>{
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rot);
    ctx.fillStyle='#78716c'; ctx.strokeStyle='#44403c'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath(); ctx.ellipse(-b.r*.3,-b.r*.3,b.r*.3,b.r*.2,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Players
  Object.entries(GS.players||{}).forEach(([uid,p])=>{
    if(!p.alive)return;
    const isMe=uid===myUID;
    const px=isMe?myX:p.x, py=isMe?myY:p.y;
    const rad=BR*(p.rmod||1);

    ctx.save();
    if(p.ghost) ctx.globalAlpha=0.45;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(px,py+rad+5,rad*.75,rad*.25,0,0,Math.PI*2); ctx.fill();

    // Freeze
    if(p.frozen){
      ctx.strokeStyle='#93c5fd'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
      ctx.shadowColor='#93c5fd'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(px,py,rad+8,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur=0;
    }

    // Shield ring
    if(p.shield){
      ctx.save();
      const sr=rad+10+Math.sin(ts/200)*2;
      ctx.strokeStyle='#3b82f6'; ctx.lineWidth=3; ctx.shadowColor='#3b82f6'; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(px,py,sr,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // Ball body - chunky cartoon style
    const g=ctx.createRadialGradient(px-rad*.4,py-rad*.4,0,px,py,rad);
    g.addColorStop(0,lc(p.color,60)); g.addColorStop(.55,p.color); g.addColorStop(1,lc(p.color,-50));
    ctx.fillStyle=g;
    ctx.shadowColor=p.color; ctx.shadowBlur=isMe?16:8;
    // Outline (chunky)
    ctx.strokeStyle=lc(p.color,-60); ctx.lineWidth=isMe?4:3;
    ctx.beginPath(); ctx.arc(px,py,rad,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;

    // Shine
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.ellipse(px-rad*.28,py-rad*.28,rad*.32,rad*.2,-Math.PI/5,0,Math.PI*2); ctx.fill();

    // Second smaller shine
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath(); ctx.arc(px+rad*.2,py+rad*.15,rad*.12,0,Math.PI*2); ctx.fill();

    // Powerup icon on ball
    if(p.powerup){
      const pdef=POWERUP_DEFS.find(d=>d.id===p.powerup);
      if(pdef){ctx.font=`${Math.max(12,rad*.7)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=1;ctx.fillText(pdef.icon,px,py);}
    }

    // Mirror indicator
    if(GS.mirror&&uid===myUID){
      ctx.font='10px serif'; ctx.fillText('🪞',px,py-rad-18);
    }

    // Username tag (chunky floating above ball)
    ctx.globalAlpha=1;
    const tag=p.username||(p.username==='?'?'Bot':'Bot');
    ctx.font='bold 12px Nunito,sans-serif';
    const tw=ctx.measureText(tag).width;
    const tx2=px, ty2=py-rad-24;
    ctx.fillStyle='rgba(0,0,0,.7)';
    ctx.beginPath(); ctx.roundRect(tx2-tw/2-6,ty2-10,tw+12,20,6); ctx.fill();
    ctx.strokeStyle=p.color; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(tx2-tw/2-6,ty2-10,tw+12,20,6); ctx.stroke();
    ctx.fillStyle=isMe?'#00e5ff':'#fff5e4'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(tag,tx2,ty2);

    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

</script>
