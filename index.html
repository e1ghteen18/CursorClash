<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CursorClash ⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --yellow: #f5a623;
    --green: #4ecdc4;
    --purple: #a855f7;
    --blue: #3b82f6;
    --white: #f0f0f0;
    --outline: #2a2a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--white);
    overflow: hidden;
    width: 100vw; height: 100vh;
    cursor: none;
  }

  /* ─── SCREENS ─── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .screen.hidden { display: none !important; }

  /* ─── LOGIN SCREEN ─── */
  #loginScreen {
    background: var(--bg);
  }
  .logo-wrap { text-align: center; margin-bottom: 32px; }
  .logo-title {
    font-family: 'Fredoka One', cursive;
    font-size: 72px;
    color: var(--white);
    text-shadow: 4px 4px 0 var(--accent), 8px 8px 0 #0006;
    letter-spacing: 2px;
    line-height: 1;
  }
  .logo-sub { font-size: 16px; font-weight: 800; letter-spacing: 6px; color: var(--yellow); text-transform: uppercase; margin-top: 4px; }

  .login-box {
    background: var(--card);
    border: 3px solid var(--outline);
    border-radius: 20px;
    padding: 32px;
    width: 360px;
    box-shadow: 0 8px 0 #0005;
  }
  .login-box h2 { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--yellow); margin-bottom: 20px; text-align: center; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-weight: 800; font-size: 13px; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 16px;
    background: var(--surface); border: 3px solid var(--outline); border-radius: 10px;
    color: var(--white); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
    outline: none; transition: border-color .15s;
  }
  .field input:focus { border-color: var(--accent); }

  .btn {
    display: block; width: 100%; padding: 14px;
    font-family: 'Fredoka One', cursive; font-size: 22px; letter-spacing: 1px;
    border: none; border-radius: 12px; cursor: pointer;
    transition: transform .1s, box-shadow .1s; position: relative;
  }
  .btn:active { transform: translateY(3px); box-shadow: none !important; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 5px 0 #9b1a2f; margin-bottom: 10px; }
  .btn-secondary { background: var(--card); color: var(--white); border: 3px solid var(--outline); box-shadow: 0 5px 0 #0004; font-size: 16px; padding: 10px; }
  .btn-green { background: var(--green); color: #1a1a2e; box-shadow: 0 5px 0 #2a8a83; }
  .btn-yellow { background: var(--yellow); color: #1a1a2e; box-shadow: 0 5px 0 #a06a10; }
  .btn-big { font-size: 28px; padding: 18px; }

  #authError { color: var(--accent); font-size: 13px; font-weight: 800; text-align: center; margin-top: 8px; min-height: 18px; }
  .login-toggle { text-align: center; margin-top: 12px; font-size: 13px; color: #aaa; }
  .login-toggle span { color: var(--yellow); font-weight: 800; cursor: pointer; text-decoration: underline; }

  /* ─── LOBBY SCREEN ─── */
  #lobbyScreen { background: var(--bg); }
  .lobby-inner { width: 500px; text-align: center; }
  .lobby-title { font-family: 'Fredoka One', cursive; font-size: 52px; color: var(--white); text-shadow: 3px 3px 0 var(--accent); margin-bottom: 4px; }
  .lobby-user { font-size: 14px; font-weight: 800; color: var(--green); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 24px; justify-content: center; }
  .stat-box {
    background: var(--card); border: 3px solid var(--outline); border-radius: 14px;
    padding: 12px 20px; flex: 1;
  }
  .stat-val { font-family: 'Fredoka One', cursive; font-size: 32px; color: var(--yellow); }
  .stat-lbl { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .menu-btns { display: flex; flex-direction: column; gap: 10px; }
  .coins-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--yellow); color: #1a1a2e; border-radius: 99px;
    padding: 6px 16px; font-family: 'Fredoka One', cursive; font-size: 18px;
    margin-bottom: 20px; box-shadow: 0 4px 0 #a06a10;
  }

  /* ─── MATCHMAKING ─── */
  #matchmakingScreen { background: var(--bg); }
  .mm-box {
    background: var(--card); border: 3px solid var(--outline); border-radius: 20px;
    padding: 40px; text-align: center; width: 360px;
    box-shadow: 0 8px 0 #0005;
  }
  .mm-title { font-family: 'Fredoka One', cursive; font-size: 36px; color: var(--yellow); margin-bottom: 16px; }
  .spinner {
    width: 64px; height: 64px; border-radius: 50%;
    border: 6px solid var(--outline); border-top-color: var(--accent);
    animation: spin .7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .mm-status { font-size: 15px; font-weight: 800; color: #aaa; margin-bottom: 8px; }
  .mm-count { font-family: 'Fredoka One', cursive; font-size: 48px; color: var(--green); }

  /* ─── GAME SCREEN ─── */
  #gameScreen { background: #0d0d1a; }
  #gameCanvas { display: block; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
    pointer-events: none; z-index: 10;
  }
  .hud-box {
    background: rgba(15,52,96,.85); border: 2.5px solid var(--outline);
    border-radius: 10px; padding: 6px 14px; backdrop-filter: blur(4px);
  }
  .hud-coins { display: flex; align-items: center; gap: 6px; font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--yellow); }
  .hud-score { font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--white); }
  .hud-event {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    font-family: 'Fredoka One', cursive; font-size: 20px;
    background: rgba(233,69,96,.9); border-radius: 10px; padding: 6px 20px;
    border: 2.5px solid #ff6b8a; color: #fff;
    animation: eventPulse 1s ease-in-out infinite;
  }
  @keyframes eventPulse { 0%,100%{opacity:1} 50%{opacity:.7} }
  #leaderboard {
    position: absolute; right: 12px; top: 60px;
    background: rgba(15,52,96,.85); border: 2.5px solid var(--outline);
    border-radius: 12px; padding: 10px 14px; min-width: 160px; backdrop-filter: blur(4px);
    pointer-events: none; z-index: 10;
  }
  .lb-title { font-family: 'Fredoka One', cursive; font-size: 14px; color: var(--yellow); margin-bottom: 6px; text-align: center; }
  .lb-row { font-size: 13px; font-weight: 800; padding: 2px 0; display: flex; justify-content: space-between; gap: 16px; }
  .lb-me { color: var(--green); }

  /* ─── OVERLAY (intermission, event announce) ─── */
  #overlay {
    position: absolute; inset: 0;
    background: rgba(10,10,24,.8);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; backdrop-filter: blur(6px);
  }
  #overlay.hidden { display: none; }
  .overlay-title { font-family: 'Fredoka One', cursive; font-size: 72px; color: var(--white); text-shadow: 4px 4px 0 var(--accent); text-align: center; line-height: 1; }
  .overlay-sub { font-size: 22px; font-weight: 800; color: var(--yellow); margin-top: 12px; text-align: center; }
  .overlay-countdown { font-family: 'Fredoka One', cursive; font-size: 96px; color: var(--green); margin-top: 16px; }
  .shop-grid { display: flex; gap: 14px; margin-top: 24px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
  .shop-item {
    background: var(--card); border: 3px solid var(--outline);
    border-radius: 14px; padding: 14px 18px; text-align: center; width: 130px;
    cursor: pointer; transition: transform .1s, border-color .1s;
  }
  .shop-item:hover { transform: translateY(-3px); border-color: var(--yellow); }
  .shop-item .item-icon { font-size: 36px; margin-bottom: 6px; }
  .shop-item .item-name { font-weight: 800; font-size: 13px; }
  .shop-item .item-cost { font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--yellow); margin-top: 4px; }

  /* ─── END SCREEN ─── */
  #endScreen { background: var(--bg); z-index: 100; }
  .end-box { background: var(--card); border: 3px solid var(--outline); border-radius: 20px; padding: 40px; text-align: center; width: 400px; box-shadow: 0 8px 0 #0005; }
  .end-place { font-family: 'Fredoka One', cursive; font-size: 80px; line-height: 1; }
  .end-place.gold { color: #ffd700; text-shadow: 3px 3px 0 #a06a00; }
  .end-place.silver { color: #c0c0c0; text-shadow: 3px 3px 0 #888; }
  .end-place.bronze { color: #cd7f32; text-shadow: 3px 3px 0 #7a4a10; }
  .end-place.other { color: var(--white); }
  .end-title { font-family: 'Fredoka One', cursive; font-size: 32px; color: var(--yellow); margin-bottom: 6px; }
  .end-stats { display: flex; gap: 12px; margin: 20px 0; justify-content: center; }
  .end-stat { background: var(--surface); border-radius: 10px; padding: 10px 16px; }
  .end-stat-val { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--green); }
  .end-stat-lbl { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; }

  /* ─── POWERUP ICONS ON CANVAS ─── */
  .floating-text {
    position: absolute; font-family: 'Fredoka One', cursive; font-size: 20px;
    pointer-events: none; z-index: 20; animation: floatUp 1.2s ease forwards;
  }
  @keyframes floatUp { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-60px)} }

  /* ─── TOAST ─── */
  #toast {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 3px solid var(--outline); border-radius: 12px;
    padding: 12px 24px; font-family: 'Fredoka One', cursive; font-size: 20px;
    z-index: 200; transition: opacity .3s; pointer-events: none;
  }
  #toast.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
<div class="screen" id="loginScreen">
  <div class="logo-wrap">
    <div class="logo-title">CursorClash</div>
    <div class="logo-sub">⚡ Battle of the Cursors ⚡</div>
  </div>
  <div class="login-box">
    <h2 id="authTitle">Sign In</h2>
    <div class="field"><label>Email</label><input type="email" id="emailInput" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="passInput" placeholder="••••••••"></div>
    <div class="field" id="usernameField" style="display:none"><label>Username</label><input type="text" id="usernameInput" placeholder="CoolPlayer99" maxlength="16"></div>
    <button class="btn btn-primary" id="authBtn">PLAY!</button>
    <div id="authError"></div>
    <div class="login-toggle">
      <span id="toggleAuth">No account? Sign up!</span>
    </div>
  </div>
</div>

<!-- ══════════════════ LOBBY SCREEN ══════════════════ -->
<div class="screen hidden" id="lobbyScreen">
  <div class="lobby-inner">
    <div class="lobby-title">CursorClash</div>
    <div class="lobby-user" id="lobbyUser">Welcome back!</div>
    <div class="coins-badge">🪙 <span id="lobbyCoins">0</span> Coins</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="statWins">0</div><div class="stat-lbl">Wins</div></div>
      <div class="stat-box"><div class="stat-val" id="statGames">0</div><div class="stat-lbl">Games</div></div>
      <div class="stat-box"><div class="stat-val" id="statKills">0</div><div class="stat-lbl">Knockouts</div></div>
    </div>
    <div class="menu-btns">
      <button class="btn btn-primary btn-big" id="playBtn">⚡ FIND MATCH</button>
      <button class="btn btn-secondary" id="logoutBtn">Log Out</button>
    </div>
  </div>
</div>

<!-- ══════════════════ MATCHMAKING ══════════════════ -->
<div class="screen hidden" id="matchmakingScreen">
  <div class="mm-box">
    <div class="mm-title">Finding Match...</div>
    <div class="spinner"></div>
    <div class="mm-status">Players in lobby:</div>
    <div class="mm-count" id="mmCount">1</div>
    <button class="btn btn-secondary" style="margin-top:20px" id="cancelMM">Cancel</button>
  </div>
</div>

<!-- ══════════════════ GAME SCREEN ══════════════════ -->
<div class="screen hidden" id="gameScreen">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="hud-box hud-coins">🪙 <span id="hudCoins">0</span></div>
    <div class="hud-box hud-score">Score: <span id="hudScore">0</span></div>
  </div>
  <div id="leaderboard">
    <div class="lb-title">🏆 SCORES</div>
    <div id="lbContent"></div>
  </div>
  <div id="overlay" class="hidden">
    <div class="overlay-title" id="overlayTitle"></div>
    <div class="overlay-sub" id="overlaySub"></div>
    <div class="overlay-countdown" id="overlayCount"></div>
    <div class="shop-grid hidden" id="shopGrid"></div>
  </div>
</div>

<!-- ══════════════════ END SCREEN ══════════════════ -->
<div class="screen hidden" id="endScreen">
  <div class="end-box">
    <div class="end-place" id="endPlace">🏆</div>
    <div class="end-title" id="endTitle">Victory!</div>
    <div class="end-stats">
      <div class="end-stat"><div class="end-stat-val" id="endScore">0</div><div class="end-stat-lbl">Score</div></div>
      <div class="end-stat"><div class="end-stat-val" id="endKOs">0</div><div class="end-stat-lbl">KOs</div></div>
      <div class="end-stat"><div class="end-stat-val" id="endCoins">+0</div><div class="end-stat-lbl">Coins Earned</div></div>
    </div>
    <button class="btn btn-primary btn-big" id="playAgainBtn">⚡ PLAY AGAIN</button>
    <button class="btn btn-secondary" style="margin-top:10px" id="backLobbyBtn">Back to Lobby</button>
  </div>
</div>

<!-- ══════════════════ TOAST ══════════════════ -->
<div id="toast" class="hidden"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update, push, onValue, remove, serverTimestamp, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ══════════════════════════════════════════════
// 🔥 FIREBASE CONFIG — replace with yours!
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBkgoy55zPuKilo7VvgEMWCXqVV0CjS5Wc",
  authDomain: "cclash-b912b.firebaseapp.com",
  projectId: "cclash-b912b",
  storageBucket: "cclash-b912b.firebasestorage.app",
  messagingSenderId: "637730369453",
  appId: "1:637730369453:web:af0dafdbd32d3249193b24",
  measurementId: "G-HVNXYWK2XY"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ══════════════════════════════════════════════
//  GAME CONSTANTS
// ══════════════════════════════════════════════
const COLORS = ['#e94560','#4ecdc4','#f5a623','#a855f7','#3b82f6','#22c55e','#f97316','#ec4899'];
const BALL_RADIUS = 18;
const ARENA_W = 900, ARENA_H = 650;
const FRICTION = 0.88;
const SPEED = 10;
const MAX_PLAYERS = 4;
const ROUND_DURATION = 60; // seconds per round
const ROUNDS_PER_GAME = 3;
const INTERMISSION_SEC = 8;

const POWERUP_TYPES = [
  { id:'speed',    icon:'⚡', color:'#f5a623', name:'SPEED BOOST',   duration:5000  },
  { id:'big',      icon:'💢', color:'#e94560', name:'MEGA SIZE',     duration:6000  },
  { id:'shield',   icon:'🛡️', color:'#3b82f6', name:'SHIELD',        duration:5000  },
  { id:'ghost',    icon:'👻', color:'#a855f7', name:'GHOST MODE',    duration:4000  },
  { id:'magnet',   icon:'🧲', color:'#22c55e', name:'COIN MAGNET',   duration:6000  },
  { id:'freeze',   icon:'❄️', color:'#93c5fd', name:'FREEZE RAY',    duration:3000  },
];

const OBSTACLE_SETS = [
  [ // Classic
    {x:200,y:200,w:80,h:80}, {x:620,y:370,w:80,h:80},
    {x:380,y:140,w:60,h:120},{x:380,y:390,w:60,h:120},
  ],
  [ // Cross
    {x:370,y:100,w:60,h:160},{x:370,y:390,w:60,h:160},
    {x:100,y:295,w:160,h:60},{x:640,y:295,w:160,h:60},
  ],
  [ // Maze-ish
    {x:150,y:150,w:200,h:30},{x:550,y:150,w:200,h:30},
    {x:150,y:470,w:200,h:30},{x:550,y:470,w:200,h:30},
    {x:420,y:280,w:30,h:90},
  ]
];

const EVENTS = [
  { id:'lowgrav',  name:'LOW GRAVITY',   icon:'🌙', color:'#a855f7', desc:'Gravity is weak — fly around!', modifier: s => { s.gravity = 0.08; } },
  { id:'lava',     name:'LAVA FLOOR!',   icon:'🔥', color:'#e94560', desc:'Stay off the bottom — it BURNS!', modifier: s => { s.lavaFloor = true; } },
  { id:'storm',    name:'WIND STORM',    icon:'🌪️', color:'#f5a623', desc:'Strong wind blows everyone!', modifier: s => { s.windX = (Math.random()>.5?1:-1)*2; } },
  { id:'tiny',     name:'TINY BALLS',    icon:'🔬', color:'#4ecdc4', desc:'Everyone shrinks down!', modifier: (s,ps) => { Object.values(ps).forEach(p=>p.radiusMod=0.5); } },
  { id:'giant',    name:'GIANT BALLS',   icon:'🦣', color:'#f97316', desc:'Everyone gets BIG!', modifier: (s,ps) => { Object.values(ps).forEach(p=>p.radiusMod=1.8); } },
  { id:'slippery', name:'ICE RINK',      icon:'🧊', color:'#93c5fd', desc:'Super slippery floor!', modifier: s => { s.frictionMod = 0.97; } },
  { id:'sticky',   name:'STICKY FLOOR',  icon:'🍯', color:'#f5a623', desc:'Everyone moves in glue!', modifier: s => { s.frictionMod = 0.6; } },
  { id:'dark',     name:'LIGHTS OUT!',   icon:'🌑', color:'#1a1a2e', desc:'Who turned off the lights!?', modifier: s => { s.darkMode = true; } },
  { id:'volcano',  name:'VOLCANO!',      icon:'🌋', color:'#dc2626', desc:'Boulders rain from above!', modifier: s => { s.volcanoMode = true; } },
  { id:'fastpow',  name:'POWERUP FRENZY',icon:'⚡', color:'#22c55e', desc:'Powerups spawn like crazy!', modifier: s => { s.fastPowerups = true; } },
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentUser = null, userProfile = null;
let currentRoom = null, myPlayerId = null;
let roomRef = null, unsubRoom = null;
let gameState = null;
let myX = ARENA_W/2, myY = ARENA_H/2, myVX = 0, myVY = 0;
let keys = {};
let particles = [], floatingTexts = [], boulders = [];
let lastFrame = 0, animId = null;
let myScore = 0, myKOs = 0;
let lobbyRef = null, unsubLobby = null;
let powerupSpawnTimer = 0;

// ── DOM shortcuts ──
const $ = id => document.getElementById(id);
const show = id => $('loginScreen,lobbyScreen,matchmakingScreen,gameScreen,endScreen'.split(',').find(s=>s===id)||id)?.classList?.remove?.('hidden');

function showScreen(name) {
  ['loginScreen','lobbyScreen','matchmakingScreen','gameScreen','endScreen'].forEach(id => {
    $(id).classList.toggle('hidden', id !== name);
  });
}

function toast(msg, color='#f5a623') {
  const t = $('toast');
  t.textContent = msg; t.style.color = color;
  t.classList.remove('hidden');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.add('hidden'), 2200);
}

// ══════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════
let isSignUp = false;
$('toggleAuth').addEventListener('click', () => {
  isSignUp = !isSignUp;
  $('authTitle').textContent = isSignUp ? 'Create Account' : 'Sign In';
  $('authBtn').textContent = isSignUp ? 'CREATE ACCOUNT' : 'PLAY!';
  $('usernameField').style.display = isSignUp ? '' : 'none';
  $('toggleAuth').textContent = isSignUp ? 'Already have an account? Sign in!' : 'No account? Sign up!';
  $('authError').textContent = '';
});

$('authBtn').addEventListener('click', async () => {
  const email = $('emailInput').value.trim();
  const pass  = $('passInput').value;
  const uname = $('usernameInput').value.trim();
  $('authError').textContent = '';
  try {
    if (isSignUp) {
      if (!uname) { $('authError').textContent = 'Please enter a username!'; return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await set(ref(db, `users/${cred.user.uid}`), { username: uname, coins: 100, wins: 0, games: 0, kills: 0 });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    $('authError').textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,'');
  }
});

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await get(ref(db, `users/${user.uid}`));
    if (!snap.exists()) {
      // legacy accounts without profile
      await set(ref(db, `users/${user.uid}`), { username: user.email.split('@')[0], coins: 100, wins: 0, games: 0, kills: 0 });
    }
    userProfile = (await get(ref(db, `users/${user.uid}`))).val();
    loadLobby();
  } else {
    currentUser = null; userProfile = null;
    showScreen('loginScreen');
  }
});

$('logoutBtn').addEventListener('click', () => signOut(auth));

// ══════════════════════════════════════════════
//  LOBBY
// ══════════════════════════════════════════════
function loadLobby() {
  $('lobbyUser').textContent = `👋 Hey, ${userProfile.username}!`;
  $('lobbyCoins').textContent = userProfile.coins;
  $('statWins').textContent  = userProfile.wins  || 0;
  $('statGames').textContent = userProfile.games || 0;
  $('statKills').textContent = userProfile.kills || 0;
  showScreen('lobbyScreen');
}

$('playBtn').addEventListener('click', startMatchmaking);
$('cancelMM').addEventListener('click', cancelMatchmaking);

// ══════════════════════════════════════════════
//  MATCHMAKING
// ══════════════════════════════════════════════
async function startMatchmaking() {
  showScreen('matchmakingScreen');
  $('mmCount').textContent = '1';
  
  // Check for open lobbies
  const lobbySnap = await get(ref(db, 'matchmaking'));
  let joined = false;
  
  if (lobbySnap.exists()) {
    const lobbies = lobbySnap.val();
    for (const [lid, lobby] of Object.entries(lobbies)) {
      const playerCount = Object.keys(lobby.players || {}).length;
      if (!lobby.started && playerCount < MAX_PLAYERS) {
        // Join this lobby
        await set(ref(db, `matchmaking/${lid}/players/${currentUser.uid}`), {
          username: userProfile.username, ready: true, joinedAt: Date.now()
        });
        currentRoom = lid; joined = true;
        watchLobby(lid);
        break;
      }
    }
  }
  
  if (!joined) {
    // Create new lobby
    const newLobby = push(ref(db, 'matchmaking'));
    currentRoom = newLobby.key;
    await set(newLobby, {
      host: currentUser.uid, started: false, createdAt: Date.now(),
      players: { [currentUser.uid]: { username: userProfile.username, ready: true, joinedAt: Date.now() } }
    });
    watchLobby(currentRoom);
  }
}

function watchLobby(lid) {
  if (unsubLobby) { off(ref(db, `matchmaking/${lid}`)); }
  lobbyRef = ref(db, `matchmaking/${lid}`);
  unsubLobby = onValue(lobbyRef, async snap => {
    if (!snap.exists()) return;
    const lobby = snap.val();
    const players = Object.entries(lobby.players || {});
    $('mmCount').textContent = players.length;
    
    // Auto-start when 2+ players (or 4 players) after 5 seconds
    if (!lobby.started && players.length >= 2) {
      const allJoinedAt = players.map(([,p])=>p.joinedAt);
      const oldest = Math.min(...allJoinedAt);
      const elapsed = Date.now() - oldest;
      if (elapsed >= 4000 || players.length >= MAX_PLAYERS) {
        // Only host starts the game
        if (lobby.host === currentUser.uid) {
          off(lobbyRef);
          unsubLobby = null;
          await startGame(lid, players);
        }
      }
    }
    
    if (lobby.gameStarted) {
      off(lobbyRef);
      unsubLobby = null;
      joinGame(lid);
    }
  });
}

async function cancelMatchmaking() {
  if (currentRoom) {
    await remove(ref(db, `matchmaking/${currentRoom}/players/${currentUser.uid}`));
  }
  if (unsubLobby) { off(lobbyRef); unsubLobby = null; }
  currentRoom = null;
  loadLobby();
}

// ══════════════════════════════════════════════
//  GAME START (host creates game state)
// ══════════════════════════════════════════════
async function startGame(lid, playerEntries) {
  const playerList = {};
  const spawnPoints = [
    {x:80,y:80},{x:ARENA_W-80,y:80},{x:80,y:ARENA_H-80},{x:ARENA_W-80,y:ARENA_H-80}
  ];
  playerEntries.forEach(([uid, info], i) => {
    playerList[uid] = {
      username: info.username,
      color: COLORS[i % COLORS.length],
      x: spawnPoints[i].x, y: spawnPoints[i].y,
      vx: 0, vy: 0,
      score: 0, kills: 0,
      alive: true, shield: false, ghost: false,
      radiusMod: 1,
      powerup: null, powerupEnd: 0,
      frozen: false, frozenEnd: 0,
      coins: 0,
    };
  });

  const obstacleSet = OBSTACLE_SETS[Math.floor(Math.random()*OBSTACLE_SETS.length)];
  
  const initialState = {
    players: playerList,
    round: 1, phase: 'countdown', // countdown | playing | intermission | event
    roundStart: Date.now() + 3500,
    roundEnd: 0,
    powerups: {},
    coins: {},
    obstacles: obstacleSet,
    event: null,
    gravity: 0.15,
    windX: 0,
    frictionMod: 1,
    lavaFloor: false,
    darkMode: false,
    volcanoMode: false,
    fastPowerups: false,
    host: currentUser.uid,
  };

  await set(ref(db, `games/${lid}`), initialState);
  await update(ref(db, `matchmaking/${lid}`), { gameStarted: true, gameId: lid });
  joinGame(lid);
}

// ══════════════════════════════════════════════
//  JOIN / WATCH GAME
// ══════════════════════════════════════════════
function joinGame(gid) {
  currentRoom = gid;
  myPlayerId = currentUser.uid;
  myScore = 0; myKOs = 0;
  particles = []; floatingTexts = []; boulders = [];
  
  showScreen('gameScreen');
  setupCanvas();
  
  roomRef = ref(db, `games/${gid}`);
  unsubRoom = onValue(roomRef, snap => {
    if (!snap.exists()) return;
    const prev = gameState;
    gameState = snap.val();
    onGameStateUpdate(prev);
  });

  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKeyUp);
  document.addEventListener('mousemove', onMouseMove);
  
  if (animId) cancelAnimationFrame(animId);
  lastFrame = performance.now();
  animId = requestAnimationFrame(gameLoop);
}

function setupCanvas() {
  const canvas = $('gameCanvas');
  canvas.width  = ARENA_W;
  canvas.height = ARENA_H;
  canvas.style.width  = Math.min(window.innerWidth, ARENA_W * (window.innerHeight / ARENA_H)) + 'px';
  canvas.style.height = Math.min(window.innerHeight, ARENA_H) + 'px';
}

// ══════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════
let mouseX = ARENA_W/2, mouseY = ARENA_H/2;
function onMouseMove(e) {
  const canvas = $('gameCanvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = ARENA_W / rect.width, scaleY = ARENA_H / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top)  * scaleY;
}
function onKey(e)   { keys[e.code] = true; }
function onKeyUp(e) { keys[e.code] = false; }

// ══════════════════════════════════════════════
//  GAME LOOP (LOCAL PREDICTION)
// ══════════════════════════════════════════════
let lastPush = 0;

function gameLoop(ts) {
  animId = requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastFrame) / 1000, 0.05);
  lastFrame = ts;

  if (!gameState) return;

  const me = gameState.players?.[myPlayerId];
  if (!me) return;

  // Phase handling
  if (gameState.phase === 'countdown') {
    const left = (gameState.roundStart - Date.now()) / 1000;
    showOverlay(gameState.round === 1 ? 'GET READY!' : `ROUND ${gameState.round}`, '', left > 0 ? Math.ceil(left).toString() : 'GO!');
    if (left <= 0 && gameState.host === myPlayerId) {
      // Transition to playing
      update(roomRef, { phase: 'playing', roundEnd: Date.now() + ROUND_DURATION * 1000 });
    }
    drawGame();
    return;
  }

  if (gameState.phase === 'playing') {
    hideOverlay();
    const timeLeft = Math.max(0, (gameState.roundEnd - Date.now()) / 1000);
    updateHUD(timeLeft);

    if (timeLeft <= 0 && gameState.host === myPlayerId) {
      endRound();
    }
  }

  if (gameState.phase === 'intermission') {
    const left = (gameState.intermissionEnd - Date.now()) / 1000;
    showOverlay(`ROUND ${gameState.round-1} OVER!`, getLeaderText(), Math.max(0, Math.ceil(left)).toString());
    if (left <= 0 && gameState.host === myPlayerId) {
      nextRound();
    }
    drawGame(); return;
  }

  if (gameState.phase === 'gameover') {
    showEndScreen(); return;
  }

  // Local movement
  if (me.alive && !me.frozen) {
    let ax = 0, ay = 0;
    // Mouse movement: move toward mouse
    const dx = mouseX - myX, dy = mouseY - myY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const spd = SPEED * (me.powerup === 'speed' ? 1.7 : 1);
    if (dist > 4) {
      ax = (dx/dist) * spd;
      ay = (dy/dist) * spd;
    }
    // Keyboard too
    if (keys['ArrowLeft']||keys['KeyA'])  ax -= spd;
    if (keys['ArrowRight']||keys['KeyD']) ax += spd;
    if (keys['ArrowUp']||keys['KeyW'])    ay -= spd;
    if (keys['ArrowDown']||keys['KeyS'])  ay += spd;

    const fm = gameState.frictionMod || 1;
    myVX = (myVX + ax * dt * 8) * Math.pow(FRICTION * fm, dt * 60);
    myVY = (myVY + ay * dt * 8) * Math.pow(FRICTION * fm, dt * 60);

    // Wind
    myVX += (gameState.windX || 0) * dt * 10;
    // Gravity
    myVY += (gameState.gravity || 0.15) * dt * 60 * 0.5;

    myX = Math.max(BALL_RADIUS, Math.min(ARENA_W - BALL_RADIUS, myX + myVX));
    myY = Math.max(BALL_RADIUS, Math.min(ARENA_H - BALL_RADIUS, myY + myVY));

    // Obstacle collision
    (gameState.obstacles || []).forEach(obs => resolveObstacle(obs));

    // Lava floor damage
    if (gameState.lavaFloor && myY > ARENA_H - 40 && !me.shield) {
      // Die from lava — host handles, we just report
    }

    // Push to Firebase ~20fps
    if (ts - lastPush > 50) {
      lastPush = ts;
      update(ref(db, `games/${currentRoom}/players/${myPlayerId}`), {
        x: Math.round(myX), y: Math.round(myY),
        vx: +myVX.toFixed(2), vy: +myVY.toFixed(2)
      });
    }
  }

  // Host: collision detection, powerup spawning, boulder spawning
  if (gameState.host === myPlayerId && gameState.phase === 'playing') {
    hostTick(dt, ts);
  }

  updateParticles(dt);
  updateFloatingTexts();
  updateBoulders(dt);
  drawGame();
}

// ══════════════════════════════════════════════
//  HOST LOGIC
// ══════════════════════════════════════════════
let hostTickLast = 0;
function hostTick(dt, ts) {
  if (ts - hostTickLast < 100) return; // 10fps host ticks
  hostTickLast = ts;
  
  const players = gameState.players || {};
  const alive = Object.entries(players).filter(([,p])=>p.alive);
  const updates = {};

  // Collision between players
  alive.forEach(([uid, p], i) => {
    alive.forEach(([uid2, p2], j) => {
      if (i >= j) return;
      const r1 = BALL_RADIUS * (p.radiusMod||1);
      const r2 = BALL_RADIUS * (p2.radiusMod||1);
      const dx = p2.x - p.x, dy = p2.y - p.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < r1+r2 && dist > 0.1) {
        const nx = dx/dist, ny = dy/dist;
        const relVX = (p.vx||0) - (p2.vx||0), relVY = (p.vy||0) - (p2.vy||0);
        const speed = relVX*nx + relVY*ny;
        if (speed > 0) {
          const bounce = speed * 1.4;
          const avx1 = (p.vx||0) - bounce*nx, avy1 = (p.vy||0) - bounce*ny;
          const avx2 = (p2.vx||0) + bounce*nx, avy2 = (p2.vy||0) + bounce*ny;
          
          updates[`players/${uid}/vx`]  = +avx1.toFixed(2);
          updates[`players/${uid}/vy`]  = +avy1.toFixed(2);
          updates[`players/${uid2}/vx`] = +avx2.toFixed(2);
          updates[`players/${uid2}/vy`] = +avy2.toFixed(2);

          // Freeze powerup
          if (p.powerup === 'freeze') {
            updates[`players/${uid2}/frozen`]    = true;
            updates[`players/${uid2}/frozenEnd`] = Date.now() + 2000;
          }
          if (p2.powerup === 'freeze') {
            updates[`players/${uid}/frozen`]    = true;
            updates[`players/${uid}/frozenEnd`] = Date.now() + 2000;
          }
        }
        
        // Score: high speed hit = knockout
        const totalSpeed = Math.sqrt((p.vx||0)**2+(p.vy||0)**2);
        if (totalSpeed > 7 && !p2.shield) {
          // Check if knocked out of bounds
          if (p2.x <= BALL_RADIUS+2 || p2.x >= ARENA_W-BALL_RADIUS-2 || p2.y <= BALL_RADIUS+2 || p2.y >= ARENA_H-BALL_RADIUS-2) {
            updates[`players/${uid2}/alive`] = false;
            updates[`players/${uid}/score`]  = (p.score||0) + 100;
            updates[`players/${uid}/kills`]  = (p.kills||0) + 1;
          }
        }
      }
    });
    
    // Unfreeze check
    if (p.frozen && Date.now() > p.frozenEnd) {
      updates[`players/${uid}/frozen`] = false;
    }
    
    // Powerup expiry
    if (p.powerup && Date.now() > p.powerupEnd) {
      updates[`players/${uid}/powerup`] = null;
      updates[`players/${uid}/radiusMod`] = 1;
    }
    
    // Lava floor
    if (gameState.lavaFloor && p.y > ARENA_H - 30 && !p.shield && p.alive) {
      updates[`players/${uid}/alive`] = false;
    }
  });

  // Powerup collection
  const powerups = gameState.powerups || {};
  alive.forEach(([uid, p]) => {
    Object.entries(powerups).forEach(([pid, pu]) => {
      const dx = p.x - pu.x, dy = p.y - pu.y;
      if (Math.sqrt(dx*dx+dy*dy) < BALL_RADIUS + 20) {
        const ptype = POWERUP_TYPES.find(pt=>pt.id===pu.type);
        updates[`players/${uid}/powerup`]   = pu.type;
        updates[`players/${uid}/powerupEnd`] = Date.now() + ptype.duration;
        if (pu.type === 'big')  updates[`players/${uid}/radiusMod`] = 1.8;
        if (pu.type === 'shield') updates[`players/${uid}/shield`] = true;
        if (pu.type === 'ghost')  updates[`players/${uid}/ghost`]  = true;
        updates[`powerups/${pid}`] = null;
      }
    });
    // Coin collection
    const coins = gameState.coins || {};
    Object.entries(coins).forEach(([cid, c]) => {
      const mdx = p.x - c.x, mdy = p.y - c.y;
      const attract = p.powerup === 'magnet' ? 80 : 20;
      if (Math.sqrt(mdx*mdx+mdy*mdy) < BALL_RADIUS + attract) {
        updates[`players/${uid}/coins`] = (p.coins||0) + c.value;
        updates[`coins/${cid}`] = null;
      }
    });
  });

  // Spawn powerups
  powerupSpawnTimer += 100;
  const spawnRate = gameState.fastPowerups ? 3000 : 7000;
  if (powerupSpawnTimer > spawnRate) {
    powerupSpawnTimer = 0;
    if (Object.keys(powerups).length < 5) {
      const ptype = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
      const newPu = push(ref(db, `games/${currentRoom}/powerups`));
      update(ref(db, `games/${currentRoom}/powerups/${newPu.key}`), {
        type: ptype.id, x: 80 + Math.random()*(ARENA_W-160), y: 80 + Math.random()*(ARENA_H-160)
      });
      // Also spawn a coin
      const nc = push(ref(db, `games/${currentRoom}/coins`));
      update(ref(db, `games/${currentRoom}/coins/${nc.key}`), {
        x: 80+Math.random()*(ARENA_W-160), y: 80+Math.random()*(ARENA_H-160), value: 10+Math.floor(Math.random()*20)
      });
    }
  }

  // Volcano boulders
  if (gameState.volcanoMode && Math.random() < 0.15) {
    boulders.push({
      x: Math.random()*ARENA_W, y: -20,
      vx: (Math.random()-0.5)*3, vy: 2+Math.random()*3,
      r: 12+Math.random()*16,
    });
  }

  if (Object.keys(updates).length > 0) {
    update(roomRef, updates);
  }
}

// ══════════════════════════════════════════════
//  GAME STATE UPDATE HANDLER
// ══════════════════════════════════════════════
function onGameStateUpdate(prev) {
  if (!gameState) return;
  const me = gameState.players?.[myPlayerId];
  if (!me) return;
  
  // Sync position if far off
  if (me.alive) {
    const dx = me.x - myX, dy = me.y - myY;
    if (Math.sqrt(dx*dx+dy*dy) > 60) {
      myX = me.x; myY = me.y;
      myVX = me.vx || 0; myVY = me.vy || 0;
    }
  }
  
  // Detect KO events
  const prevPlayers = prev?.players || {};
  Object.entries(gameState.players || {}).forEach(([uid, p]) => {
    const pp = prevPlayers[uid];
    if (pp && pp.alive && !p.alive) {
      spawnExplosion(p.x, p.y, p.color, 20);
      if (uid === myPlayerId) toast('💀 You got knocked out!', '#e94560');
    }
    if (pp && (pp.kills||0) < (p.kills||0) && uid === myPlayerId) {
      myKOs = p.kills;
      toast('💥 KNOCKOUT! +100', '#4ecdc4');
      spawnFloatingText(myX, myY, '+100 KO!', '#4ecdc4');
    }
    if (pp && (pp.coins||0) < (p.coins||0) && uid === myPlayerId) {
      const gained = p.coins - pp.coins;
      spawnFloatingText(myX, myY-30, `+${gained} 🪙`, '#f5a623');
    }
  });

  // Event change
  if (prev?.event !== gameState.event && gameState.event) {
    const ev = EVENTS.find(e=>e.id===gameState.event);
    if (ev) { toast(`${ev.icon} ${ev.name} — ${ev.desc}`, ev.color); }
  }

  updateLeaderboard();
  $('hudCoins').textContent = gameState.players?.[myPlayerId]?.coins || 0;
  $('hudScore').textContent = gameState.players?.[myPlayerId]?.score || 0;
}

// ══════════════════════════════════════════════
//  ROUND MANAGEMENT (host only)
// ══════════════════════════════════════════════
async function endRound() {
  const state = gameState;
  if (!state || state.phase !== 'playing') return;

  // Respawn all & pick random event
  const updates = { phase: 'intermission', intermissionEnd: Date.now() + INTERMISSION_SEC*1000 };
  
  // Trigger random event for next round
  const ev = EVENTS[Math.floor(Math.random()*EVENTS.length)];
  updates.event = ev.id;

  const spawnPoints = [{x:80,y:80},{x:ARENA_W-80,y:80},{x:80,y:ARENA_H-80},{x:ARENA_W-80,y:ARENA_H-80}];
  let i = 0;
  Object.keys(state.players||{}).forEach(uid => {
    const sp = spawnPoints[i%4]; i++;
    updates[`players/${uid}/alive`]     = true;
    updates[`players/${uid}/x`]        = sp.x;
    updates[`players/${uid}/y`]        = sp.y;
    updates[`players/${uid}/vx`]       = 0;
    updates[`players/${uid}/vy`]       = 0;
    updates[`players/${uid}/powerup`]  = null;
    updates[`players/${uid}/shield`]   = false;
    updates[`players/${uid}/ghost`]    = false;
    updates[`players/${uid}/frozen`]   = false;
    updates[`players/${uid}/radiusMod`]= 1;
  });
  // Clear field items
  updates.powerups = {};
  updates.coins = {};
  updates.gravity = 0.15;
  updates.windX = 0;
  updates.frictionMod = 1;
  updates.lavaFloor = false;
  updates.darkMode = false;
  updates.volcanoMode = false;
  updates.fastPowerups = false;

  await update(roomRef, updates);
}

async function nextRound() {
  const state = gameState;
  const newRound = (state.round || 1) + 1;
  
  if (newRound > ROUNDS_PER_GAME) {
    await update(roomRef, { phase: 'gameover' });
    return;
  }

  // Apply event modifier
  const ev = EVENTS.find(e=>e.id===state.event);
  const modState = {
    gravity: 0.15, windX: 0, frictionMod: 1, lavaFloor: false,
    darkMode: false, volcanoMode: false, fastPowerups: false
  };
  const fakePlayers = {};
  if (ev) ev.modifier(modState, fakePlayers);

  await update(roomRef, {
    phase: 'countdown',
    round: newRound,
    roundStart: Date.now() + 4000,
    ...modState,
    obstacles: OBSTACLE_SETS[Math.floor(Math.random()*OBSTACLE_SETS.length)]
  });
}

// ══════════════════════════════════════════════
//  RENDERING
// ══════════════════════════════════════════════
function drawGame() {
  const canvas = $('gameCanvas');
  const ctx = canvas.getContext('2d');
  if (!gameState) return;

  const dark = gameState.darkMode;

  // Background
  if (dark) {
    ctx.fillStyle = '#05050a';
    ctx.fillRect(0, 0, ARENA_W, ARENA_H);
    // Spotlight around my player
    const grad = ctx.createRadialGradient(myX, myY, 0, myX, myY, 180);
    grad.addColorStop(0, 'rgba(255,255,255,0.06)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, ARENA_W, ARENA_H);
  } else {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, ARENA_W, ARENA_H);
    // Grid
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1;
    for (let x=0;x<ARENA_W;x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ARENA_H); ctx.stroke(); }
    for (let y=0;y<ARENA_H;y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(ARENA_W,y); ctx.stroke(); }
  }

  // Arena border
  ctx.strokeStyle = '#2a2a5a';
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, ARENA_W-4, ARENA_H-4);

  // Lava floor
  if (gameState.lavaFloor) {
    const lava = ctx.createLinearGradient(0, ARENA_H-50, 0, ARENA_H);
    lava.addColorStop(0, 'rgba(239,68,68,0)');
    lava.addColorStop(1, 'rgba(239,68,68,0.6)');
    ctx.fillStyle = lava;
    ctx.fillRect(0, ARENA_H-50, ARENA_W, 50);
    ctx.fillStyle = 'rgba(251,146,60,0.4)';
    ctx.fillRect(0, ARENA_H-12, ARENA_W, 12);
  }

  // Obstacles
  (gameState.obstacles||[]).forEach(obs => {
    ctx.fillStyle = '#1e3a5f';
    ctx.strokeStyle = '#2a4a7f';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 8);
    ctx.fill(); ctx.stroke();
    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath();
    ctx.roundRect(obs.x+3, obs.y+3, obs.w-6, 8, 4);
    ctx.fill();
  });

  // Coins
  Object.values(gameState.coins||{}).forEach(c => {
    ctx.save();
    ctx.shadowColor = '#f5a623'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#f5a623';
    ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fde68a';
    ctx.beginPath(); ctx.arc(c.x-2, c.y-2, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Powerups
  Object.values(gameState.powerups||{}).forEach(pu => {
    const ptype = POWERUP_TYPES.find(p=>p.id===pu.type);
    if (!ptype) return;
    const now = performance.now();
    const pulse = Math.sin(now/300)*3;
    ctx.save();
    ctx.shadowColor = ptype.color; ctx.shadowBlur = 16+pulse;
    ctx.fillStyle = ptype.color + '33';
    ctx.strokeStyle = ptype.color;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(pu.x, pu.y, 20+pulse, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ptype.icon, pu.x, pu.y);
  });

  // Boulders (volcano)
  boulders.forEach(b => {
    ctx.save();
    ctx.fillStyle = '#78716c'; ctx.strokeStyle = '#44403c'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
  });

  // Players
  Object.entries(gameState.players||{}).forEach(([uid, p]) => {
    if (!p.alive) return;
    const isMe = uid === myPlayerId;
    const px = isMe ? myX : p.x;
    const py = isMe ? myY : p.y;
    const rad = BALL_RADIUS * (p.radiusMod || 1);
    
    // Shadow
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(px, py+rad+4, rad*0.8, rad*0.25, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.save();
    if (p.ghost) ctx.globalAlpha = 0.45;
    
    // Shield ring
    if (p.shield) {
      ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3;
      ctx.shadowColor = '#3b82f6'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(px, py, rad+8, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
    }
    
    // Freeze effect
    if (p.frozen) {
      ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 2;
      ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(px, py, rad+5, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Ball
    const grad = ctx.createRadialGradient(px-rad*0.35, py-rad*0.35, 0, px, py, rad);
    grad.addColorStop(0, lightenColor(p.color, 50));
    grad.addColorStop(0.6, p.color);
    grad.addColorStop(1, darkenColor(p.color, 40));
    
    ctx.fillStyle = grad;
    ctx.strokeStyle = isMe ? '#fff' : darkenColor(p.color, 30);
    ctx.lineWidth = isMe ? 3 : 2;
    ctx.shadowColor = p.color; ctx.shadowBlur = isMe ? 14 : 6;
    ctx.beginPath(); ctx.arc(px, py, rad, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.ellipse(px-rad*0.3, py-rad*0.3, rad*0.3, rad*0.2, -Math.PI/4, 0, Math.PI*2); ctx.fill();

    // Powerup icon
    if (p.powerup) {
      const ptype = POWERUP_TYPES.find(pt=>pt.id===p.powerup);
      if (ptype) {
        ctx.font = `${rad*0.8}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ptype.icon, px, py);
      }
    }

    // Username tag
    ctx.globalAlpha = 1;
    ctx.font = 'bold 12px Nunito, sans-serif';
    ctx.textAlign = 'center';
    const tag = p.username || 'Player';
    const tw = ctx.measureText(tag).width;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.roundRect(px - tw/2 - 5, py - rad - 22, tw+10, 18, 4); ctx.fill();
    ctx.fillStyle = isMe ? '#4ecdc4' : '#f0f0f0';
    ctx.fillText(tag, px, py - rad - 13);

    ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
function spawnExplosion(x, y, color, count=12) {
  for (let i=0; i<count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = 2 + Math.random()*6;
    particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      color: Math.random()<0.5 ? color : '#fff',
      r: 3+Math.random()*5, life: 0.8+Math.random()*0.4, maxLife: 1.2,
    });
  }
  // Ring sparks
  for (let i=0;i<8;i++) {
    const angle = Math.random()*Math.PI*2;
    particles.push({
      x: x + Math.cos(angle)*BALL_RADIUS, y: y + Math.sin(angle)*BALL_RADIUS,
      vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8,
      color:'#fde68a', r:2, life:0.5, maxLife:0.5,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function spawnFloatingText(x, y, text, color='#fff') {
  const el = document.createElement('div');
  el.className = 'floating-text';
  el.textContent = text; el.style.color = color;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  $('gameScreen').appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function updateFloatingTexts() {} // DOM-based

function updateBoulders(dt) {
  for (let i=boulders.length-1;i>=0;i--) {
    const b = boulders[i];
    b.x += b.vx; b.y += b.vy; b.vy += 0.15;
    if (b.y > ARENA_H+40) boulders.splice(i,1);
  }
}

// ══════════════════════════════════════════════
//  HUD / OVERLAY
// ══════════════════════════════════════════════
function updateHUD(timeLeft) {
  const tl = Math.ceil(timeLeft);
  $('hudScore').textContent = gameState.players?.[myPlayerId]?.score || 0;
  // Show event banner in HUD
  const evDiv = document.querySelector('.hud-event') || (() => {
    const d = document.createElement('div'); d.className='hud-event'; $('hud').appendChild(d); return d;
  })();
  if (gameState.event) {
    const ev = EVENTS.find(e=>e.id===gameState.event);
    evDiv.textContent = `${ev?.icon||''} ${ev?.name||''} — ${tl}s`;
    evDiv.style.display = '';
  } else {
    evDiv.style.display = 'none';
  }
}

function updateLeaderboard() {
  const players = gameState.players || {};
  const sorted = Object.entries(players).sort(([,a],[,b])=>(b.score||0)-(a.score||0));
  const medals = ['🥇','🥈','🥉','4️⃣'];
  $('lbContent').innerHTML = sorted.map(([uid,p],i)=>
    `<div class="lb-row ${uid===myPlayerId?'lb-me':''}">
      <span>${medals[i]||''} ${p.username}</span>
      <span>${p.score||0}</span>
    </div>`
  ).join('');
}

function getLeaderText() {
  const players = gameState.players||{};
  const sorted = Object.entries(players).sort(([,a],[,b])=>(b.score||0)-(a.score||0));
  if (!sorted.length) return '';
  return `🏆 Leading: ${sorted[0][1].username} (${sorted[0][1].score||0} pts)`;
}

function showOverlay(title, sub='', count='') {
  $('overlay').classList.remove('hidden');
  $('overlayTitle').textContent = title;
  $('overlaySub').textContent = sub;
  $('overlayCount').textContent = count;
  $('shopGrid').classList.add('hidden');
}
function hideOverlay() { $('overlay').classList.add('hidden'); }

// ══════════════════════════════════════════════
//  END SCREEN
// ══════════════════════════════════════════════
async function showEndScreen() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  const players = gameState.players || {};
  const sorted = Object.entries(players).sort(([,a],[,b])=>(b.score||0)-(a.score||0));
  const myRank = sorted.findIndex(([uid])=>uid===myPlayerId) + 1;
  const me = players[myPlayerId] || {};
  const coinsEarned = (me.coins||0) + (myRank===1?50:myRank===2?25:10);

  const placeLabels = ['🥇','🥈','🥉','4️⃣'];
  const titles = ['WINNER!','2nd Place!','3rd Place!','Better Luck!'];
  const placeClasses = ['gold','silver','bronze','other'];
  
  $('endPlace').textContent = placeLabels[myRank-1]||'🏁';
  $('endPlace').className = `end-place ${placeClasses[myRank-1]||'other'}`;
  $('endTitle').textContent = titles[myRank-1]||'Game Over!';
  $('endScore').textContent = me.score||0;
  $('endKOs').textContent   = me.kills||0;
  $('endCoins').textContent = `+${coinsEarned}`;

  // Update user profile
  await update(ref(db, `users/${currentUser.uid}`), {
    coins: (userProfile.coins||0) + coinsEarned,
    wins:  (userProfile.wins||0) + (myRank===1?1:0),
    games: (userProfile.games||0) + 1,
    kills: (userProfile.kills||0) + (me.kills||0),
  });
  userProfile = (await get(ref(db, `users/${currentUser.uid}`))).val();

  // Cleanup
  cleanup();
  showScreen('endScreen');
}

function cleanup() {
  document.removeEventListener('keydown', onKey);
  document.removeEventListener('keyup', onKeyUp);
  document.removeEventListener('mousemove', onMouseMove);
  if (unsubRoom) { off(roomRef); unsubRoom = null; }
  if (unsubLobby) { off(lobbyRef); unsubLobby = null; }
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  gameState = null; currentRoom = null; myPlayerId = null;
  particles = []; floatingTexts = []; boulders = [];
  keys = {};
  hideOverlay();
}

$('playAgainBtn').addEventListener('click', startMatchmaking);
$('backLobbyBtn').addEventListener('click', () => loadLobby());

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function resolveObstacle(obs) {
  const nearX = Math.max(obs.x, Math.min(myX, obs.x+obs.w));
  const nearY = Math.max(obs.y, Math.min(myY, obs.y+obs.h));
  const dx = myX-nearX, dy = myY-nearY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if (dist < BALL_RADIUS) {
    const nx = dist>0?dx/dist:0, ny = dist>0?dy/dist:0;
    myX = nearX + nx*BALL_RADIUS;
    myY = nearY + ny*BALL_RADIUS;
    const dot = myVX*nx + myVY*ny;
    myVX -= 1.5*dot*nx; myVY -= 1.5*dot*ny;
  }
}

function lightenColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16)+amt, g=parseInt(hex.slice(3,5),16)+amt, b=parseInt(hex.slice(5,7),16)+amt;
  return '#'+[r,g,b].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');
}
function darkenColor(hex, amt) { return lightenColor(hex, -amt); }
